# 锡安码头之战 — 中文本地化
name: 锡安码头之战
description: |
  锡安，人类最后的城市。机器大军突破了码头顶部，成千上万的
  哨兵蜂拥而入。机甲驾驶员操纵外骨骼沿防线排列，向蜂群
  倾泻弹药。美富根船长指挥防御，而奈奥比穿越混战赶往电力
  终端以恢复城市的EMP防御网。两台巨型钻掘机向锡安核心
  推进——哪怕只有一台到达，城市就将陷落。

unit_classes:
  mifune:
    display_name: 美富根船长
    description: |
      锡安防御指挥官。在最前方的机甲中战斗，即使弹药耗尽也
      拒绝撤退。在一切看似失去希望时，他的勇气撑住了防线。
  apu_pilot:
    display_name: 机甲驾驶员
    description: |
      装甲人员单元操作员。他们的外骨骼被螺栓固定在码头地板上
      ——是向哨兵蜂群倾泻火力的固定炮台。火力强大，
      机动性为零。
  niobe:
    display_name: 奈奥比
    description: |
      逻各斯号舰长。舰队中最快的气垫船驾驶员，现在在码头中
      徒步奔跑。她必须到达电力终端以恢复EMP防御网。
  zion_infantry:
    display_name: 锡安步兵
    description: |
      携带火箭发射器的志愿防卫者。装甲轻薄但决心保卫家园——
      人类最后的避难所。
  medic:
    display_name: 锡安医护兵
    description: |
      锡安医疗队的战地医护兵。在码头战斗的混乱中维持伤员的
      生命。
  sentinel:
    display_name: 哨兵
    description: |
      机械章鱼——触手杀戮机器，以压倒性的数量蜂拥而至。
      单个脆弱，但速度和数量使其致命。它们从码头顶部的
      缺口涌入。
  sentinel_cluster:
    display_name: 哨兵集群
    description: |
      密集的哨兵群体合而为一——数十只融合成一团扭动的金属
      触手球。远比任何单个哨兵坚韧。
  drill_machine:
    display_name: 钻掘机
    description: |
      设计用于钻透锡安外壳的巨型钻掘机械。缓慢、重甲、
      一旦到达核心就无法阻挡。码头防御的存在就是为了
      阻止这些机器。

terrain_types:
  machine_wall:
    description: |
      码头内部的结构支柱和扭曲残骸。即使哨兵也无法通过。
  catwalk:
    description: |
      横跨码头的金属高架通道。高处提供一定的防御优势。
  power_conduit:
    description: |
      沿码头墙壁通向终端的裸露电力管道。奈奥比必须沿此
      路线前进以恢复电力。

narrative:
  title: 锡安码头之战
  description: |
    机器大军突破了锡安码头。哨兵从天花板涌入，钻掘机向城市
    核心推进。美富根船长率领机甲防御，奈奥比奔向电力终端。
  intro: |
    警报声在码头中回荡，天花板开始弯曲。金属触手从缺口中
    扭动——哨兵到了。机甲驾驶员启动外骨骼，开火射击。
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        外围机甲的弹药带耗尽。哨兵源源不断涌来，如同无尽的
        金属潮水从头顶的缺口倾泻而下。
    - trigger: on_turn_start
      turn: 10
      text: |
        钻掘机轰鸣前进，码头地板随之震颤。美富根对部下嘶声
        呼喊坚守防线——绝不能让那些机器到达核心。
    - trigger: on_unit_killed
      unit_id: u_b_mifune_1
      text: |
        美富根的机甲轰然跪倒，被哨兵撕成碎片。船长用手枪
        射击直到蜂群将他吞没。"为了锡安……"
