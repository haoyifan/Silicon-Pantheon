# 长夜之战 — 中文本地化
name: 长夜之战 — 权力的游戏
description: |
  临冬城，305年。亡者大军南下。活人的七名守护者——
  琼恩·雪诺、丹妮莉丝、艾莉亚、猎犬、乔拉、布蕾妮和
  席恩——在临冬城对抗由夜王和亡灵龙韦赛利昂率领的
  八名亡者之恐。终结之法唯一：杀死夜王。撑过十二回合，
  黎明就会来临。

unit_classes:
  jon_snow:
    display_name: 琼恩·雪诺
    description: |
      白狼，北境之王。手持瓦雷利亚钢剑长爪——
      一击即可粉碎异鬼。
  daenerys:
    display_name: 丹妮莉丝·坦格利安
    description: |
      龙女王。骑乘卓耿在战场上空倾泻龙焰。
      法术型——伤害由魔抗减免。
  rhaegal:
    display_name: 雷哥
    description: |
      绿龙雷哥，以雷加为名。与丹妮莉丝并肩飞越临冬城墙——
      第二条活龙，对抗韦赛利昂的亡灵之焰。卓耿的弟弟。
      没有他，丹妮莉丝独自在天空中同时对抗韦赛利昂和夜王。
  brienne:
    display_name: 布蕾妮
    description: |
      塔斯的布蕾妮爵士，新封骑士。维斯特洛最强的剑士，
      全身铠甲。在死亡之潮前守住防线。
  jorah:
    display_name: 乔拉·莫尔蒙
    description: |
      安达尔人乔拉爵士。手持山姆·塔利赠送的瓦雷利亚钢剑。
      保护他的女王至最后一息。
  arya:
    display_name: 艾莉亚·史塔克
    description: |
      无面之人。在布拉佛斯无面者学院训练的少女。
      她携带瓦雷利亚钢匕首——猫爪匕首——如影子般移动。
      速度极快，极其脆弱。在剧中她从黑暗中跃出一击
      杀死夜王。将她送到夜王身边，战争就结束了。
  the_hound:
    display_name: 猎犬
    description: |
      桑铎·克里冈。一个残暴、高大的战士，憎恨火焰但依然
      穿过它战斗。巨大的生命值和高攻击使他成为活人阵营
      最强的前线肉盾。
  theon:
    display_name: 席恩·葛雷乔伊
    description: |
      最后的葛雷乔伊。铁群岛弓箭手，以生命守护神木林
      和心树。远程物理攻击者——2-3射程让他在死者
      到达城墙前削减敌军。
  night_king:
    display_name: 夜王
    description: |
      第一个异鬼，森林之子所造。一个手势就能指挥死者。
      冰之魔法粉碎钢铁、复活阵亡者。飞行——骑乘韦赛利昂
      或飘浮在战场上空。杀死他，所有尸鬼都会倒下。关键目标。
  viserion:
    display_name: 韦赛利昂
    description: |
      亡灵巨龙，被夜王之触复活。喷吐蓝焰融化城墙。
      远程法术毁灭者，但面对卓耿的龙焰时脆弱。
  frostfang:
    display_name: 霜牙
    description: |
      异鬼将领。手持活冰之矛，触碰之物瞬间冻结。
      他的冰冻光环减速敌人——高魔抗和法术射程使他
      成为控制型威胁。
  bonelord:
    display_name: 骨君
    description: |
      异鬼将领。亡灵术副官，在战斗中复活阵亡者。
      高法术攻击和射程——留在前线后方引导黑暗力量。
  coldhands:
    display_name: 冷手
    description: |
      异鬼将领。身披远古冰甲的重装巨兽。缓慢但几乎
      不可杀死——死者阵营的攻城锤。在瓶颈处吸收伤害。
  grim:
    display_name: 凛魂
    description: |
      精英尸鬼勇士——一个阵亡的瑟恩人战士，仍挥舞着
      双铜斧。快速侧翼奇兵，利用壕沟缺口突袭。
  hollow:
    display_name: 虚骸
    description: |
      精英尸鬼勇士——一个复活的巨人，高大而缓慢。
      巨大的生命值和攻击力。碾碎防线的攻城单位。
  shade:
    display_name: 幽影
    description: |
      精英尸鬼勇士——一个前史塔克士兵，诡异地快速而
      无声。在前方侦察，以打了就跑的方式骚扰守军。

terrain_types:
  frozen_lake:
    display_name: 冰封湖泊
    description: |
      一片碎裂的冰面。脚下打滑——穿越消耗3移动力。
      在开阔的冰面上没有防御加成。
  fire_trench:
    display_name: 火壕
    description: |
      注满焦油并点燃的壕沟。不可通行——死者必须
      找到缺口或被迫从突破口涌入。
  godswood:
    display_name: 神木林
    description: |
      古老的鱼梁木森林，旧神的圣地。茂密的树冠
      提供掩护。+2防御，移动消耗2。
  winterfell_wall:
    display_name: 临冬城墙
    description: |
      临冬城的古老花岗岩城墙。不可通行——死者
      必须突破城门才能进入。
  crypts:
    display_name: 临冬城地下墓穴
    description: |
      临冬城下方古老的埋葬墓穴。黑暗、狭窄的通道。
      +1防御（掩护），移动消耗2。
  armory:
    display_name: 军械库
    description: |
      城堡铁匠铺和龙晶军械库。黑暗中炉火熊熊。
      +1防御，移动消耗1。

narrative:
  title: 长夜之战
  description: |
    临冬城，305年。活人对亡者大军进行最后的抵抗。
    夜王必须被消灭，否则黎明永远不会到来。
  intro: |
    黑暗。多斯拉克弯刀点燃火焰冲向北方的黑暗。
    一个接一个，火焰熄灭了。然后死者来了。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        壕沟点燃。一道火墙将活人和死者隔开——暂时如此。
        尸鬼开始堆积在火焰上，用自己的身体将火扑灭。
    - trigger: on_turn_start
      turn: 8
      text: |
        夜王朝神木林降落。他想要三眼乌鸦。
        席恩搭上又一支箭，静静等待。
    - trigger: on_unit_killed
      unit_id: u_r_night_king_1
      text: |
        夜王如冰般碎裂。战场上每一具尸鬼都瘫倒在地。
        黎明在临冬城上方破晓。
    - trigger: on_unit_killed
      unit_id: u_b_arya_1
      text: |
        艾莉亚倒下了。猫爪匕首叮当落在冰冻的地面上。
        没有她，无人能及时到达夜王身边。
    - trigger: on_unit_killed
      unit_id: u_b_theon_1
      text: |
        席恩·葛雷乔伊倒在心树前。他是一个好人。
        神木林无人守护了。
    - trigger: on_unit_killed
      unit_id: u_b_jon_snow_1
      text: |
        琼恩·雪诺最后一次倒下。没有红袍女巫能再次
        将他唤回。活人失去了他们的王。
    - trigger: on_unit_killed
      unit_id: u_r_viserion_1
      text: |
        韦赛利昂在蓝焰和碎骨的暴雨中坠落大地。
        夜王失去了他的巨龙。
