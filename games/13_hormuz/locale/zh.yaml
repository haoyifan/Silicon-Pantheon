# 霍尔木兹海峡 — 中文本地化
name: 霍尔木兹海峡 — 史诗之怒行动，2026 — 现代虚构
description: |
  2026年2月——在伊朗/以色列/美国长期危机的一次假想升级中，
  美以联合打击编队发动"史诗之怒行动"，十二小时内对伊朗领导层、
  导弹设施和地下铀浓缩设施实施近九百次协同打击。
  伊朗革命卫队以水雷封锁霍尔木兹海峡、派出快艇群、
  发射沙希德无人机、启动岸防导弹进行报复。

  本场景将开场的十二小时压缩为十六回合的竞速：
  美以打击编队必须突破海峡，完成第一天开始的斩首行动，
  并在革命卫队重整防御之前，由海豹突击队或第13突击队
  在拉腊克岛上的硬化铀浓缩掩体内放置爆破装药。

  纯属虚构。与任何真实行动的相似之处都是推测性的——
  请视为汤姆·克兰西式技术惊悚风格的近未来历史假想。

unit_classes:
  trump:
    display_name: 美国总统（特朗普）
    description: |
      航母战斗群上的总司令，通过中央司令部数据链指挥
      打击行动。本身几乎没有战斗力，但通过实时协调
      鼓舞队伍（治疗）。阵亡则行动失去政治支持而终止。
  netanyahu:
    display_name: 以色列总理（内塔尼亚胡）
    description: |
      通过战争内阁协调打击行动的以色列总理。与美国总统
      同样脆弱，同样政治化——在类别定义中作为场外
      调度员有用，本次出击未部署到战场上。
  b2:
    display_name: B-2幽灵轰炸机
    description: |
      飞翼隐身轰炸机。蓝方唯一有足够火力在防区外
      摧毁硬化岸防阵地的平台。毁灭性攻击力，远程，
      但装甲薄如纸——保持在F-35屏障之后。
  f35:
    display_name: F-35隐身战斗机
    description: |
      第五代隐身多用途战机。快速、中程、可观的伤害——
      清除水雷、无人机和快艇的主力。一回合内即可
      深入敌后。
  destroyer:
    display_name: 阿利·伯克级驱逐舰
    description: |
      宙斯盾驱逐舰，搭载战斧巡航导弹。重甲远程平台，
      但通过海峡时行动迟缓——水雷和岸防导弹是它
      最大的噩梦。
  tomahawk_sub:
    display_name: 战斧潜艇
    description: |
      水下战斧发射平台。装甲薄如纸但舰队中射程最远。
      从深水中清除硬化工事。
  navy_seal:
    display_name: 海豹突击队队长
    description: |
      唯一能实际登上铀掩体并放置爆破装药的单位。
      近战、快速，如果被巴斯基或革命卫队突击兵缠上
      就很脆弱——用空中掩护保持通路畅通。
  shayetet:
    display_name: 第13突击队队员
    description: |
      以色列海军特种部队。与海豹突击队配对——
      一个诱敌，一个登陆。快速、近战致命，
      但在持续火力下会崩溃。
  khamenei:
    display_name: 最高领袖（哈梅内伊）
    description: |
      场景开场设定：哈梅内伊在海峡西端的一艘革命卫队
      巡逻艇上，仅有1点生命——第一天斩首行动留下了
      他生死未卜的回声。蓝方如果果断推进，第一回合
      就能将他了结。
  irgc_commando:
    display_name: 革命卫队"萨贝林"突击兵
    description: |
      伊朗革命卫队职业地面部队。重甲掩体守军，
      属性大致与蓝方特种部队对等——海豹突击队和
      离心机之间的最后一道墙。
  coastal_missile:
    display_name: 岸防反舰导弹阵地
    description: |
      伊朗海岸上的固定"努尔/卡德尔"反舰与防空发射架。
      移动力0——绝不重新部署。射程远，魔法属性重伤害
      （导弹无视常规装甲）。
  irgc_speedboat:
    display_name: 革命卫队快艇
    description: |
      廉价蜂群单位。低生命、极快速、仅限近战。
      成群结队时对孤立的蓝方舰艇很危险，单独时
      则是消耗品。
  shahed_drone:
    display_name: 沙希德-136无人机
    description: |
      单程攻击无人机。脆弱，但射程足以骚扰蓝方
      纵队后方。俯冲战斗部造成魔法属性伤害。
  basij:
    display_name: 巴斯基民兵
    description: |
      准军事志愿者。属性平庸，但便宜且众多——
      掩体和沿岸阵地周围的绊线防线。

terrain_types:
  reef:
    display_name: 礁石
    description: |
      浅海珊瑚礁与礁石——任何船体都太危险，
      步兵也无法通行。完全阻挡移动。
  sea_mine:
    display_name: 水雷
    description: |
      革命卫队布设在海峡中的触发水雷。可以通过但代价
      极高——任何经过雷区的单位都会遭受爆炸重创。
      可通行但缓慢。
  beach:
    display_name: 海滩
    description: |
      沙质登陆区。沙丘和残骸提供少量掩护。
      两栖部队必须经此才能推进到内陆地形。
  desert:
    display_name: 沙漠
    description: |
      阳光炙烤的开阔地，硬土与碎石平原。
      没有掩护但也没有惩罚。岛屿与大陆的
      战略连接组织。
  mountain:
    display_name: 山脉
    description: |
      陡峭的火山岩。地面部队无法通行，直升机
      也无法在其中降落。阻挡地图南北端的移动
      与视线。
  fort_wall:
    display_name: 掩体墙
    description: |
      浓缩设施周围的钢筋混凝土。不可通行——
      突击队必须从受损段突破。
  damaged_wall:
    display_name: 受损工事
    description: |
      "史诗之怒"第一天B-2打击中被震碎的掩体墙
      或岸防阵地段。可以通行但缓慢——在火力下
      爬过瓦砾。
  uranium_bunker:
    display_name: 铀浓缩掩体
    description: |
      伊朗浓缩计划的核心：满是离心机的硬化地下大厅。
      巨大的防御加成。海豹突击队或第13突击队员
      踏上任何一格掩体即可放置爆破装药，结束任务。

narrative:
  title: 霍尔木兹海峡（史诗之怒行动，2026）
  description: |
    史诗之怒行动开场数小时的十六回合压缩版：
    突破海峡，完成第一天开始的斩首行动，
    并在革命卫队重整之前占领铀浓缩掩体。
  intro: |
    2026年2月28日。哈梅内伊已在德黑兰遭到打击但尚未
    确认死亡；他的护卫艇仍在海峡入口。一架B-2已经
    飞越阿曼湾上空。革命卫队已在海峡布雷，并在伊朗
    沿岸启动岸防反舰导弹。十六回合到达掩体。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        浓烟从拉腊克岛翻滚而出。F-35穿过第一道雷区，
        驱逐舰则猛轰北面的岸防阵地。掩体依然矗立，
        守军在受损城墙周围严阵以待。
    - trigger: on_turn_start
      turn: 8
      text: |
        沙希德无人机在海峡上空螺旋盘旋。革命卫队快艇
        从大陆扇形展开。海豹突击队已在岛屿西部沙漠中
        前进一半，在沙丘间躲避，身后的驱逐舰正被岸防
        导弹锁定。
    - trigger: on_turn_start
      turn: 13
      text: |
        海峡上的最后一缕天光。掩体外墙已被防区外火力
        炸开大口。如果突破小组要进去，现在就必须进去——
        德黑兰的增援只有几小时的距离。
    - trigger: on_unit_killed
      unit_id: u_r_khamenei_1
      text: |
        确认最高领袖阵亡。打击计划完成一半——
        现在是掩体。
    - trigger: on_unit_killed
      unit_id: u_b_trump_1
      text: |
        白宫刚刚在数据链上消失。失去政治掩护，
        行动无法继续。史诗之怒行动结束。
