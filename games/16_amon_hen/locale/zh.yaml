# 阿蒙汉——远征队的分裂 — 中文本地化
name: 阿蒙汉——远征队的分裂 — 指环王
description: |
  帕斯加兰，第三纪元3019年2月26日。远征队在阿蒙汉山脚歇息。
  卢茨率领的强兽人从森林中杀出。波罗米尔冲上去保护梅里和皮聘。
  阿拉贡、莱戈拉斯和金雳在树林中浴血奋战。波罗米尔是关键人物——
  如果他倒下，霍比特人将被掳走，任务将陷入危机。
  灵感来源于 J.R.R. 托尔金《指环王》中阿蒙汉远征队分裂一节。

unit_classes:
  aragorn:
    display_name: 阿拉贡
    description: |
      伊西尔杜尔的后裔，北方游侠。以长剑和一个
      不愿再次辜负任务的人的怒火战斗。
      蓝方最强的近战战士。
  boromir:
    display_name: 波罗米尔
    description: |
      白塔统领，摄政王德内梭尔的长子。他吹响刚铎号角，
      冲向强兽人保护霍比特人。关键人物——他若倒下，
      霍比特人将被掳走。
  legolas:
    display_name: 莱戈拉斯
    description: |
      密林王子。他的弓在树间唱响——每一箭都
      找到一个强兽人的咽喉。快速且远程致命。
  gimli:
    display_name: 金雳
    description: |
      格洛因之子。他的战斧像劈柴一样劈开强兽人的盾。
      比其他人慢，但每一击都如雷霆。他数着每一个杀敌。
  merry:
    display_name: 梅里亚达克·烈酒鹿
    description: |
      梅里——聪明、勇敢、矮小到被人低估。
      他的古墓短剑在邪恶面前微微发光。
  pippin:
    display_name: 皮瑞格林·图克
    description: |
      皮聘——远征队中最年轻的，关键时刻很勇敢。
      在波罗米尔的庇护下与梅里并肩作战。
  lurtz:
    display_name: 卢茨
    description: |
      战斗型强兽人队长，在艾辛格的地坑中培育。
      巨大、凶残、目标明确。持巨弓和弯刀。
      红方关键人物——他的命令是把半身人活着带给萨鲁曼。
  ugluk:
    display_name: 乌格鲁克
    description: |
      强兽人队长，卢茨的副手。坚韧、残暴，
      聪明到足以管住普通兽人。
  mauhur:
    display_name: 毛胡尔
    description: |
      强兽人追踪者和侧翼奇兵。率领一支斥候小队
      切断森林中的逃跑路线。
  lugdush:
    display_name: 卢格杜什
    description: |
      强兽人狂战士。脸上涂着萨鲁曼的白手印。
      以不顾一切的狂怒冲锋。
  grishnakh:
    display_name: 格里什纳赫
    description: |
      依附于强兽人部队的魔多兽人。比强兽人矮小但更狡猾。
      为索伦效力，不为萨鲁曼。
  uruk_archer:
    display_name: 强兽人弩手
    description: |
      手持重型弩的强兽人。发射的铁弩箭在射程内
      贯穿铠甲。
  uruk_shield:
    display_name: 强兽人盾兵
    description: |
      手持宽铁盾的强兽人。组成突击前线，极难击倒。

terrain_types:
  forest:
    display_name: 森林
    description: 古老的橡树和榆树。+2防御，适合伏击。
  ruins:
    display_name: 废墟
    description: 阿蒙汉山顶破败的努门诺尔废墟。+3防御，移动消耗2。
  hilltop:
    display_name: 山顶
    description: 视见之丘。+2防御，移动消耗2。
  pillars:
    display_name: 倒塌石柱
    description: 倒塌的努门诺尔石柱，半埋在苔藓中。+2防御，移动消耗2。
  rocks:
    display_name: 碎石地
    description: 碎石和岩屑。+1防御，移动消耗2。
  river:
    display_name: 安都因河
    description: 安都因大河，寒冷湍急。无法通行。

narrative:
  title: 阿蒙汉——远征队的分裂
  description: |
    帕斯加兰，第三纪元3019年。艾辛格的强兽人袭向
    远征队。波罗米尔必须活下来保护霍比特人。
  intro: |
    刚铎号角在树间回响——一次，两次，三次。波罗米尔
    在战斗。阿拉贡拔剑奔向声音的方向。透过冬日光秃的
    树枝，黑影以可怕的速度移动。萨鲁曼的白手印
    绘在他们的盾牌上。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        波罗米尔再次吹响号角。它的呼声越过宁希索尔湖，
        在悬崖上回荡。他立于霍比特人身前，剑已染红到柄。
    - trigger: on_turn_start
      turn: 6
      text: |
        箭矢钉入波罗米尔周围的树干。强兽人从四面八方
        逼近。阿拉贡又砍倒两个，但每倒一个，就有三个
        从灌木中冒出。
    - trigger: on_turn_start
      turn: 10
      text: |
        森林中满是铁器碰撞和垂死者的尖叫。梅里和皮聘
        躲在波罗米尔的盾后投掷石块。
    - trigger: on_unit_killed
      unit_id: u_b_boromir_1
      text: |
        波罗米尔跪倒，身中数箭。他向阿拉贡低语："我
        本愿追随您，我的兄弟。我的统帅。我的王。"
    - trigger: on_unit_killed
      unit_id: u_r_lurtz_1
      text: |
        阿拉贡一剑斩下卢茨的头颅。强兽人队长倒下了，
        但他的部下继续推进——执行萨鲁曼的命令
        不需要首领。
