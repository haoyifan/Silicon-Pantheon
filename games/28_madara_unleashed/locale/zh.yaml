# 宇智波斑的暴走 — 中文本地化
name: 宇智波斑的暴走
description: |
  第四次忍界大战。宇智波斑已被秽土转生复活，独自一人面对
  整个忍者联军。凭借轮回眼和近乎无限的查克拉，他就是一支
  军队。仙人模式下的鸣人与五影必须坚持到封印术准备完毕。
  杀死斑几乎不可能——联军靠的是耐力，而非蛮力。

unit_classes:
  naruto:
    display_name: 漩涡鸣人
    description: |
      仙人模式，与自然能量融合。他的螺旋丸变体和影分身
      使他成为联军最强战力。只要他活着，封印术就能终结
      这场战争。
  gaara:
    display_name: 我爱罗
    description: |
      第五代风影。他的砂之盾提供无与伦比的防御，砂瀑棺
      可以从远处攻击。联军的防御支柱。
  onoki:
    display_name: 大野木
    description: |
      第三代土影。他的尘遁能在分子层面瓦解一切——战场上
      射程最远的忍术。年迈而脆弱，但毁灭性极强。
  tsunade:
    display_name: 纲手
    description: |
      第五代火影。她的创造再生术和医疗忍术让联军持续战斗。
      同时还能一拳打穿山脉。
  raikage:
    display_name: 雷影
    description: |
      第四代雷影。雷遁铠甲使他成为最快的忍者。他的雷犁
      热刀如同货运列车般猛击。全速前进，毫无花招。
  mei:
    display_name: 照美冥
    description: |
      第五代水影。双血继限界——熔遁和沸遁。她的腐蚀性雾气
      和熔岩流在中距离控制空间。
  allied_shinobi:
    display_name: 忍者联军士兵
    description: |
      来自五大国的普通忍者，史上首次联合作战。他们知道自己
      无法击败斑——但他们可以争取时间。
  madara:
    display_name: 宇智波斑
    description: |
      传奇宇智波。轮回眼、须佐能乎、陨石召唤、无限月读——
      史上最强忍者。刻意设计为压倒性强大。这是一场BOSS战。
  white_zetsu:
    display_name: 白绝分身
    description: |
      斑的军队量产的植物士兵。虚弱且可消耗——它们的存在
      只为分散注意力，以绝对数量压制。
  reanimated_ninja:
    display_name: 秽土转生忍者
    description: |
      通过秽土转生复活的忍者。保留生前的忍术，以远程忍术
      攻击。比白绝更难击杀。
  zetsu_medic:
    display_name: 白绝医疗型
    description: |
      白绝变体，能与其他白绝分身融合并修复它们。治疗能力
      弱，但能维持炮灰的战斗力。

terrain_types:
  rock:
    description: |
      被先前忍术冲击掀起的嶙峋岩层。难以穿越但能提供
      极好的掩护。

narrative:
  title: 宇智波斑的暴走
  description: |
    第四次忍界大战。宇智波斑在全盛时期复活，独自面对整个
    忍者联军。五影和鸣人必须坚持到封印术准备完毕。
  intro: |
    天空暗了下来。一个身影独立于山脊之上，轮回眼泛着紫色
    光芒。宇智波斑微微一笑——他已经几十年没有痛快战斗过了。
    在他身后，白绝大军绵延至天际。
  events:
    - trigger: on_turn_start
      turn: 4
      text: |
        斑从天空召唤了两颗陨石。五影勉强偏转——大野木在重压
        下背部咔咔作响。"就这点本事吗，大野木？"
    - trigger: on_turn_start
      turn: 10
      text: |
        斑激活了完成体须佐能乎。一个巨大的铠甲武士在他
        周围具现化，巨刃横斩山脉。联军为之震撼。
    - trigger: on_unit_killed
      unit_id: u_b_naruto_1
      text: |
        鸣人倒下了。仙人模式的查克拉从他的眼中消散。没有了
        九尾人柱力，封印术无法完成。战争输了。
