# 纽约之战 — 中文本地化
name: 纽约之战 — 复仇者联盟
description: |
  纽约市，2012年。洛基在斯塔克大厦上空打开了传送门，
  释放齐塔瑞大军入侵曼哈顿。复仇者联盟首次集结——
  钢铁侠、雷神、美国队长、浩克、黑寡妇和鹰眼——
  誓要关闭传送门、击败入侵者。击败洛基即可终结入侵。

unit_classes:
  iron_man:
    display_name: 钢铁侠
    description: |
      托尼·斯塔克身穿Mark VII战甲。斥力光束、集束炮
      和飞行能力赋予他无与伦比的战场机动性。
  thor:
    display_name: 雷神
    description: |
      雷霆之神，手持雷神之锤。毁灭性的闪电打击和神级
      耐力使他成为团队的核心战力。
  captain_america:
    display_name: 美国队长
    description: |
      史蒂夫·罗杰斯，超级战士。振金盾牌和战术天赋使他
      成为复仇者联盟的天然领袖。
  hulk:
    display_name: 浩克
    description: |
      布鲁斯·班纳的另一个自我。越愤怒越强大。
      一个绿色的破坏球，碾碎一切。
  black_widow:
    display_name: 黑寡妇
    description: |
      娜塔莎·罗曼诺夫，顶级间谍和精英格斗家。
      速度极快，近距离致命，以速度弥补脆弱。
  hawkeye:
    display_name: 鹰眼
    description: |
      克林特·巴顿，世界最强弓箭手。各种特殊箭矢让他
      成为屋顶上的单人炮台。
  nick_fury:
    display_name: 尼克·弗瑞
    description: |
      神盾局局长。资深间谍和战士，集结团队并从后方
      提供战术支援。
  loki:
    display_name: 洛基
    description: |
      诡计之神，手持齐塔瑞权杖。幻术和能量冲击波
      使他成为危险的指挥官。他若倒下，传送门将关闭。
  chitauri_commander:
    display_name: 齐塔瑞指挥官
    description: |
      齐塔瑞入侵部队的精锐军官。装甲厚重、攻势凶猛，
      率领突击小队穿越街道。
  chitauri_warrior:
    display_name: 齐塔瑞战士
    description: |
      从传送门涌出的普通外星士兵。单独力量薄弱
      但攻势不绝。
  chitauri_chariot:
    display_name: 齐塔瑞战车
    description: |
      在城市峡谷中穿梭扫射的悬浮攻击载具。
      速度快、火力猛但被困地面时十分脆弱。
  leviathan_spawn:
    display_name: 利维坦幼体
    description: |
      一只年幼的齐塔瑞利维坦，身披角质装甲，
      体型尚能在摩天大楼间穿行。动作缓慢却坚不可摧，
      无视步枪火力，直接碾碎前线防御。
  chitauri_skiff:
    display_name: 齐塔瑞天空飞艇
    description: |
      由带翼齐塔瑞侦察兵驾驶的轻型飞行器。
      为速度而生，在屋顶间穿梭扰乱复仇者的侧翼，
      让对手来不及集中火力。
  chitauri_bio_tech:
    display_name: 齐塔瑞生化技师
    description: |
      纤瘦的齐塔瑞专才，与蜂巢意识相连。
      释放再生生化脉冲，修复齐塔瑞血肉组织，
      让入侵军即便伤亡惨重也能持续推进。

terrain_types:
  building:
    display_name: 建筑物
    description: |
      曼哈顿的摩天大楼和办公楼。提供坚实掩护
      但瓦砾遍布的走廊减缓移动。
  rubble:
    display_name: 废墟
    description: |
      齐塔瑞攻击留下的碎混凝土和扭曲钢筋。
      在废墟中提供少许掩护。
  leviathan:
    display_name: 利维坦残骸
    description: |
      被浩克的铁拳和钢铁侠的导弹击落的齐塔瑞利维坦的
      铠甲残骸。巨大的躯体阻挡街道，形成掩护。
  grand_central:
    display_name: 中央车站
    description: |
      布扎艺术风格的标志性建筑，现为平民疏散点。
      厚重的大理石墙壁和拱形穹顶提供坚固掩护。
      若齐塔瑞攻到此处，平民将无路可退。
  rooftop:
    display_name: 屋顶
    description: |
      曼哈顿的屋顶，视野开阔，俯瞰大街。
      射手的理想阵地——高处提供极佳的防御加成。
  stark_tower:
    display_name: 斯塔克大厦
    description: |
      托尼·斯塔克闪亮的总部，现为齐塔瑞传送门的
      中心。复仇者联盟的坚固阵地。

narrative:
  title: 纽约之战
  description: |
    曼哈顿，2012年。传送门在斯塔克大厦上方撕裂天空，
    齐塔瑞蜂拥而出。复仇者联盟必须守住防线、击败洛基，
    在城市沦陷前关闭传送门。
  intro: |
    天空被异界光芒撕裂。齐塔瑞战车在摩天大楼间飞驰，
    战士涌上街头。六位英雄和一位间谍大师是地球与征服者
    之间唯一的屏障。
  events:
    - trigger: on_turn_start
      turn: 3
      text: |
        齐塔瑞的第一波攻势涌上公园大道。雷神
        透过雷神之锤引导闪电，浩克扭动着关节。
        美国队长说："现在开始战斗。"
    - trigger: on_turn_start
      turn: 8
      text: |
        建筑在齐塔瑞持续火力下崩塌。战车在大道上
        扫射，战士涌过每一条小巷。钢铁侠在摩天大楼
        之间疾驰，斥力光束闪耀。
    - trigger: on_turn_start
      turn: 14
      text: |
        世界安理会已向曼哈顿发射核弹。钢铁侠在通讯中
        拦截："我知道该把它送到哪里。"时间不多了。
    - trigger: on_unit_killed
      unit_id: u_r_loki_1
      text: |
        洛基倒下了。权杖在破碎的混凝土上叮当作响。
        齐塔瑞士兵一个接一个瘫倒，蜂巢意识断裂。
        传送门颤抖、收缩、闭合。寂静笼罩着残破的
        曼哈顿。复仇者们在废墟中伫立——伤痕累累，
        但团结如一。
