terrain_types:
  platform:
    display_name: Execution Platform
    move_cost: 1
    defense_bonus: 3
    glyph: "^"
    color: bright_yellow
    description: |
      The execution platform where Portgas D. Ace awaits death.
      Reaching this tile means freedom.
  building:
    display_name: Building
    move_cost: 2
    defense_bonus: 3
    glyph: "#"
    color: yellow
    description: |
      Marineford plaza structures. Provide solid cover during
      the chaotic battle.
  wall:
    display_name: Wall
    move_cost: 3
    defense_bonus: 4
    glyph: "H"
    color: bright_black
    description: |
      Fortified walls of Marineford. Difficult to cross but
      offer excellent defensive positions.
  ice:
    display_name: Ice
    move_cost: 1
    defense_bonus: -1
    glyph: "="
    color: bright_blue
    description: |
      Frozen bay created by Admiral Aokiji. Slippery surface
      offers no cover — but the pirates can cross it.
  water:
    display_name: Water
    move_cost: 4
    defense_bonus: -2
    glyph: "~"
    color: blue
    description: |
      Open sea around Marineford bay. Most units struggle to
      move through it; Jinbe thrives here.

unit_classes:
  # ---- Blue: Whitebeard Pirates (6 units) ----
  whitebeard:
    display_name: Edward Newgate (Whitebeard)
    description: |
      The Strongest Man in the World. His Gura Gura no Mi can
      shatter the air itself and create tsunamis. Old and sick,
      but still terrifying. One punch can crack the world.
    hp_max: 55
    atk: 14
    defense: 8
    res: 5
    spd: 3
    move: 2
    rng_min: 1
    rng_max: 2
    glyph: "W"
    color: white

  marco:
    display_name: Marco the Phoenix
    description: |
      First Division Commander. His phoenix flames heal his wounds
      and allies alike. Nearly impossible to kill — blue fire
      regenerates any damage. Can fly over any terrain.
    hp_max: 26
    atk: 9
    defense: 4
    res: 7
    spd: 7
    move: 5
    rng_min: 1
    rng_max: 2
    is_magic: true
    can_heal: true
    heal_amount: 6
    tags: [flying]
    glyph: "M"
    color: bright_cyan

  ace:
    display_name: Portgas D. Ace
    description: |
      Second Division Commander. Wields the Mera Mera no Mi —
      his body is living fire. Powerful ranged attacker who
      rains flame from a distance.
    hp_max: 28
    atk: 12
    defense: 4
    res: 6
    spd: 6
    move: 4
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "A"
    color: bright_red

  jozu:
    display_name: Diamond Jozu
    description: |
      Third Division Commander. His body turns to diamond,
      making him nearly indestructible. The ultimate tank.
    hp_max: 36
    atk: 10
    defense: 12
    res: 3
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "J"
    color: cyan

  vista:
    display_name: Flower Sword Vista
    description: |
      Fifth Division Commander. The Flower Swordsman who can
      match even Mihawk blade for blade. Fast and elegant.
    hp_max: 24
    atk: 11
    defense: 6
    res: 4
    spd: 6
    move: 4
    rng_min: 1
    rng_max: 1
    glyph: "V"
    color: cyan

  jinbe:
    display_name: Jinbe
    description: |
      Knight of the Sea. A fish-man karate master who commands
      water itself. Vastly stronger on water and ice terrain.
      Moves through water as easily as land.
    hp_max: 30
    atk: 11
    defense: 7
    res: 5
    spd: 5
    move: 4
    rng_min: 1
    rng_max: 2
    terrain_bonus:
      water: {atk: 4, defense: 3, move: 2}
      ice: {atk: 2, defense: 1}
    glyph: "B"
    color: bright_blue

  # ---- Red: Marines (7 units) ----
  sengoku:
    display_name: Fleet Admiral Sengoku
    description: |
      Sengoku the Buddha. The man who orchestrated Ace's execution
      to draw out Whitebeard. A strategic genius with the power
      of the Human-Human Fruit, Model: Buddha.
    hp_max: 32
    atk: 10
    defense: 7
    res: 7
    spd: 4
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "S"
    color: red

  akainu:
    display_name: Admiral Akainu
    description: |
      Sakazuki, the Magma Admiral. Absolute justice incarnate.
      His lava fists can burn through anything — even fire itself.
      The deadliest offensive force the Marines possess.
    hp_max: 36
    atk: 15
    defense: 5
    res: 5
    spd: 5
    move: 3
    rng_min: 1
    rng_max: 2
    is_magic: true
    glyph: "K"
    color: bright_red

  kizaru:
    display_name: Admiral Kizaru
    description: |
      Borsalino, the Light Admiral. Moves at the speed of light.
      The fastest man alive, firing laser beams from his fingertips
      with a bored expression.
    hp_max: 30
    atk: 11
    defense: 4
    res: 6
    spd: 9
    move: 5
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "Z"
    color: bright_yellow

  aokiji:
    display_name: Admiral Aokiji
    description: |
      Kuzan, the Ice Admiral. Froze the entire bay so the pirates
      could cross — and the Marines could fight them on it.
      Controls terrain with ice; strong at range.
    hp_max: 32
    atk: 12
    defense: 5
    res: 8
    spd: 5
    move: 3
    rng_min: 2
    rng_max: 3
    is_magic: true
    terrain_bonus:
      ice: {atk: 3, defense: 2}
    glyph: "O"
    color: bright_blue

  mihawk:
    display_name: Dracule Mihawk
    description: |
      The Greatest Swordsman in the World. Wields Yoru, the
      strongest black blade. Cuts through everything with casual
      elegance. Here as a Warlord, not by choice.
    hp_max: 28
    atk: 14
    defense: 5
    res: 4
    spd: 7
    move: 4
    rng_min: 1
    rng_max: 2
    glyph: "X"
    color: bright_black

  garp:
    display_name: Vice Admiral Garp
    description: |
      Garp the Fist, the Hero of the Marines. Ace's grandfather.
      No Devil Fruit — just raw Haki and iron fists. The toughest
      defensive wall the Marines have.
    hp_max: 40
    atk: 12
    defense: 10
    res: 6
    spd: 3
    move: 3
    rng_min: 1
    rng_max: 1
    glyph: "G"
    color: red

  smoker:
    display_name: Captain Smoker
    description: |
      Smoker the White Hunter. His Moku Moku no Mi turns his body
      to smoke. Fights at range with his jitte and smoke clouds.
    hp_max: 24
    atk: 9
    defense: 5
    res: 5
    spd: 5
    move: 4
    rng_min: 2
    rng_max: 3
    is_magic: true
    glyph: "E"
    color: bright_black

armies:
  blue:
    # Whitebeard — leading the center charge across the ice
    - {class: whitebeard, pos: {x: 10, y: 12}}
    # Marco — flying far right flank over open water
    - {class: marco, pos: {x: 18, y: 11}}
    # Ace — ranged fire support from rear center
    - {class: ace, pos: {x: 12, y: 13}}
    # Jozu — front-line tank, left of Whitebeard
    - {class: jozu, pos: {x: 8, y: 11}}
    # Vista — flanking left through narrower ice
    - {class: vista, pos: {x: 6, y: 12}}
    # Jinbe — coming through the open water on the far left
    - {class: jinbe, pos: {x: 2, y: 13}}

  red:
    # Sengoku — on the execution platform
    - {class: sengoku, pos: {x: 10, y: 0}}
    # Akainu — guarding the plaza center
    - {class: akainu, pos: {x: 11, y: 4}}
    # Kizaru — fast flanker on the right
    - {class: kizaru, pos: {x: 18, y: 3}}
    # Aokiji — ranged support on the left
    - {class: aokiji, pos: {x: 4, y: 4}}
    # Mihawk — forward position near center seawall gap
    - {class: mihawk, pos: {x: 10, y: 5}}
    # Garp — defensive wall near the platform
    - {class: garp, pos: {x: 11, y: 1}}
    # Smoker — ranged harasser at the right seawall gap
    - {class: smoker, pos: {x: 18, y: 5}}

rules:
  max_turns: 20
  first_player: blue

win_conditions:
  # A blue unit reaches the execution platform -> Ace is freed!
  - {type: reach_tile, team: blue, pos: {x: 10, y: 0}}
  - {type: reach_tile, team: blue, pos: {x: 11, y: 0}}
  # Whitebeard dies -> blue loses morale. Red wins.
  - {type: protect_unit, unit_id: u_b_whitebeard_1, owning_team: blue}
  # Either side wins by total elimination.
  - {type: eliminate_all_enemy_units}
  # Turn cap -> Marines successfully defended.
  - {type: max_turns_draw}

narrative:
  title: Marineford — Summit War
  description: |
    Marineford, the seat of Marine power. Whitebeard's fleet appears
    in the bay. The Summit War — the greatest battle of the era — begins.
  intro: |
    The frozen bay cracks and groans. Whitebeard's bisento slashes
    the air and the sea itself splits. Across the ice, the pirate
    fleet charges toward the execution platform where Ace kneels
    in chains. Three admirals rise to meet them.
  events:
    - trigger: on_turn_start
      turn: 5
      text: |
        Whitebeard tilts his bisento and punches the air. The
        quake ripples across Marineford — buildings crack, the
        ground splits. The Strongest Man in the World has entered
        the fray.
    - trigger: on_turn_start
      turn: 12
      text: |
        The plaza is chaos. Pirates and Marines clash across
        every inch of frozen bay and crumbling stone. The
        execution platform looms above it all.
    - trigger: on_unit_killed
      unit_id: u_b_whitebeard_1
      text: |
        The old man falls — but standing, his back unbowed. Even
        in death, Edward Newgate does not retreat a single step.
