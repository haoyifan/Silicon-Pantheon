# 断桥之战 — 中文本地化
name: 断桥之战 — 原创
description: |
  14x12镜像对局。两支敌对连队在残破的渡河点交锋。
  战场中央横跨着一座摇摇欲坠的石桥，东翼藏着一处浅滩，
  茂密的森林遮蔽着西翼。每方各据一座堡垒——夺取敌方
  堡垒即获胜。每方5个单位：指挥官、骑士、弓箭手、
  骑兵、法师。入门场景：规则简单易学，却又足够深邃
  以奖励优秀的战术。

terrain_types:
  river:
    display_name: 河流
  bridge:
    display_name: 石桥
  ford:
    display_name: 浅滩
  hill:
    display_name: 丘陵
  forest:
    display_name: 森林
  rocks:
    display_name: 乱石

narrative:
  title: 断桥之战
  description: |
    两支敌对连队在残破的渡河点汇集。古老的石桥尚未倒塌——
    仅仅未倒。东边藏着一处隐秘的浅滩，森林遮蔽着西翼。
    每方各据一座堡垒。先夺取对方堡垒者获胜。
  intro: |
    晨雾在河面上缭绕。透过薄雾，对岸的敌军旗帜依稀可见。
    前方的石桥破败但尚可通行。侦察兵报告东面有浅滩，
    西面是茂密森林。命令很简单：渡河，夺取他们的堡垒。
  events:
    - trigger: on_turn_start
      turn: 2
      text: |
        晨雾散去。双方终于看清了彼此。
        石桥横跨在两军之间——谁控制了它，
        谁就控制了渡河点。
    - trigger: on_turn_start
      turn: 4
      text: |
        钢铁在石桥上碰撞。第一波交锋已经开始。
        东面某处传来蹄声踏水的声响。
    - trigger: on_turn_start
      turn: 10
      text: |
        战斗仍在继续。石桥下的河水被染红。
        时间不多了——发起进攻，否则将陷入僵局。
